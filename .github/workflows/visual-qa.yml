name: Visual QA

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run qa:visual
      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-artifacts
          path: |
            qa-artifacts
            playwright-report
            test-results
          if-no-files-found: warn
